name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
       
      - name: Debugging Check
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in root:"
          ls -la
          echo "Checking for lockfile:"
          if [ -f package-lock.json ]; then echo "Lockfile found!"; else echo "Lockfile MISSING!"; fi

      - name: Install dependencies
        run: npm ci
      